server {
    listen 80;

    location / {
        proxy_pass http://host.docker.internal:8081;
        
        proxy_http_version 1.1;
        proxy_set_header Connection "keep-alive";
        proxy_buffering off; 
        proxy_cache off;
        proxy_read_timeout 24h;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}