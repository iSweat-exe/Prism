name: CI Pipeline

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ master ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          pip install . 

      - name: Lint with Ruff
        run: ruff check .

      - name: Build Docker Image
        run: docker build -t prism-api:test .