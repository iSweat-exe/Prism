services:
  api-service:
    build: .
    container_name: prism-api
    restart: always
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - /proc:/proc:ro
      - /sys:/sys:ro
      - ~/.pm2:/root/.pm2:rw
      - /:/host:ro
    environment:
      - PM2_HOME=/root/.pm2
      - PORT=8081
      - APP_NAME=prism-api
      - GATEWAY_NAME=nginx-proxy
    labels:
      - "prism.managed=true"
      - "prism.protected=true"

  # Nginx Reverse Proxy
  gateway:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-service